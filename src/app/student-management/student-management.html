<div class="page-container">
  <div class="card">

    <h2>Student Management</h2>

    <input [(ngModel)]="student.name" placeholder="Student Name" />
    <input [(ngModel)]="student.course" placeholder="Course" />

    <button (click)="saveStudent()">
      {{ editIndex === null ? 'Add Student' : 'Update Student' }}
    </button>

    <input [(ngModel)]="searchText" placeholder="Search student..." />

    <table>
      <tr>
        <th>Name</th>
        <th>Course</th>
        <th>Action</th>
      </tr>

      <tr *ngFor="let s of filteredStudents; let i = index">
        <td>{{ s.name }}</td>
        <td>{{ s.course }}</td>
        <td>
          <button (click)="deleteStudent(i)">Delete</button>
          <button (click)="editStudent(i)">Edit</button>
        </td>
      </tr>
    </table>

  </div>
</div>
