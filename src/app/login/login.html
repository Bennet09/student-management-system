<div class="login-container">
  <div class="login-card">
    <h1>Student Management System</h1>
    <p>Sign in to continue</p>

    <input
      [(ngModel)]="username"
      type="text"
      placeholder="Username"
    />

    <input
      [(ngModel)]="password"
      type="password"
      placeholder="Password"
    />

    <button (click)="login()">Login</button>

  </div>
</div>
